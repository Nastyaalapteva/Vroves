<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vroves</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   <header class="header">
        <div class="container">
            <div class="header__logo">
              <a href="/">
              <img class="header_img-logo" src="./Images/Logo.png" alt="logo">
              </a>
              <a href="/" class="header_text">Vroves</a>
            </div>

            <nav class="header__nav">
              <ul class="header__list">
                 <li><a class="active" href="/#services">PRODUCTS</a></li>
                 <li><a href="/#feedback">CONSULTING</a></li>
                 <li><a href="/#info">ABOUT US</a></li>
                 <li><a href="mailto:developer.vroves@gmail.com">CONTACT</a></li>
              </ul>
            </nav>

            <a href="mailto:developer.vroves@gmail.com" class="btn">Get Consultation</a>
        </div>
    </header>

   <div class="description__container">
      <div class="description_img">
        <img src="./Images/product-smalltools.jpg" alt="" class="description__img">
      </div>

      <div class="description__content__Small">
        <h1 class="description__title">Small Tools</h1>
        <ul class="description__list">
         <li>Face recognition</li>
         <li>Speech recognition</li>
         <li>OCR</li>
         <li>Logo detection</li>
        </ul>
        <a href="mailto:developer.vroves@gmail.com" class="description__btn">Request demo</a>
        <p class="description__text">Some available as gstreamer components</p>
      </div>
    </div>

    <script>
const btn = document.getElementById("scrollTopBtn");
const services = document.getElementById("services");
const productsLink = document.querySelector('a[href="#services"]');

let clickedProducts = false;

if (productsLink) { // ← добавь эту проверку
  productsLink.addEventListener("click", function () {
    clickedProducts = true;
    btn.classList.add("show");
  });
}

window.addEventListener("scroll", function () {
  if (!services) return; // ← защита если services тоже нет на странице
  const triggerPoint = services.offsetTop;

  if (clickedProducts || window.scrollY > triggerPoint) {
    btn.classList.add("show");
  } else {
    btn.classList.remove("show");
  }
});

btn.addEventListener("click", function () {
  window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>




</body>
